<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CafeCalc Rural</title>

<style>

body{
margin:0;
font-family:Arial;
background:#4e342e;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.container{
width:90%;
max-width:900px;
}

.titulo{
font-size:48px;
margin-bottom:40px;
}

.texto{
font-size:34px;
line-height:1.4;
margin-bottom:40px;
}

input{

width:80%;
padding:20px;
font-size:32px;
border-radius:10px;
border:none;
text-align:center;

}

.botao{

margin-top:40px;
padding:20px 50px;
font-size:28px;
border:none;
border-radius:10px;
background:#ffca28;
cursor:pointer;

}

</style>

</head>

<body>

<div class="container">

<div class="titulo">☕ CafeCalc Rural</div>

<div id="texto" class="texto"></div>

<input id="entrada" type="number" placeholder="Digite o número aqui">

<br>

<button id="continuar" class="botao">
Começar
</button>

</div>

<script>

let precoCafe = 920

let passo = -1

let dados = {}

let vozes=[]

speechSynthesis.onvoiceschanged = ()=>{
vozes = speechSynthesis.getVoices()
}

let perguntas = [

"Quantas sacas de café você colheu?",

"Quantos hectares de café você tem?",

"Quanto você gastou com mão de obra?",

"Quanto você gastou com adubo?",

"Quanto você gastou com agrotóxicos?",

"Quanto você gastou com máquinas ou trator?",

"Quanto você gastou com transporte?"

]

let campos = [

"sacas",
"hectares",
"mao",
"adubo",
"agro",
"trator",
"transporte"

]

function falar(texto){

speechSynthesis.cancel()

let msg = new SpeechSynthesisUtterance(texto)

msg.lang="pt-BR"
msg.rate=0.9

let voz = vozes.find(v=>v.lang.includes("pt"))

if(voz) msg.voice=voz

speechSynthesis.speak(msg)

}

function mostrarInicio(){

let texto =

"O preço médio da saca de café hoje é "+
precoCafe+
" reais. "+
"Este assistente vai ajudar você a calcular o lucro aproximado da sua safra."

document.getElementById("texto").innerText = texto

document.getElementById("entrada").style.display="none"

}

function proximaPergunta(){

passo++

if(passo>=perguntas.length){
calcular()
return
}

document.getElementById("entrada").value=""

document.getElementById("entrada").style.display="block"

let pergunta = perguntas[passo]

document.getElementById("texto").innerText = pergunta

falar(pergunta)

}

document.getElementById("continuar").onclick=function(){

speechSynthesis.resume()

if(passo==-1){

falar(document.getElementById("texto").innerText)

proximaPergunta()

return

}

let valor = document.getElementById("entrada").value

if(valor===""){

alert("Digite um número")

return

}

dados[campos[passo]] = Number(valor)

proximaPergunta()

}

function calcular(){

let custo =

dados.mao +
dados.adubo +
dados.agro +
dados.trator +
dados.transporte

let receita = dados.sacas * precoCafe

let lucro = receita - custo

let minimo = custo / dados.sacas

let resultado =

"Resultado aproximado da safra. "+
"O lucro aproximado é "+
lucro.toFixed(2)+
" reais. "+
"O preço mínimo da saca para não ter prejuízo é "+
minimo.toFixed(2)+
" reais. "+
"Esses valores são estimativas."

document.getElementById("entrada").style.display="none"

document.getElementById("continuar").style.display="none"

document.getElementById("texto").innerText = resultado

falar(resultado)

}

mostrarInicio()

</script>

</body>

</html>
